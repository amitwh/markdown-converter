name: CI

on:
  push:
    branches: [master, react-electron]
  pull_request:
    branches: [master, react-electron]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run renderer tests
        run: npm run test:renderer

      - name: Run linter
        run: npm run lint
